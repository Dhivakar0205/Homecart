<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HomeCart Store</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#e6d2a3;
}

/* TITLE */
h1{
    text-align:center;
    padding:20px;
}

/* GRID */
.products{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:15px;
    padding:20px;
}

/* CARD */
.card{
    background:#f5f0d8;
    border-radius:20px;
    padding:12px;
    border:2px solid #333;
}

/* IMAGE */
.card img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:15px;
}

/* BUTTON */
.btn{
    width:100%;
    padding:8px;
    margin-top:6px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

/* BUY BUTTON */
.buy{
    background:#28a745;
    color:white;
}

/* REVIEW BUTTON */
.review{
    background:#007bff;
    color:white;
}
</style>
</head>

<body>

<h1>HomeCart Store</h1>

<div class="products">

<!-- PRODUCT 1 -->
<div class="card">
<img src="image/sofa.jpg">
<h3>Sofa</h3>
<p>₹12000</p>
<button class="btn buy" onclick="goToBuy('Sofa')">Buy</button>
<button class="btn review" onclick="goToReview()">Review</button>
</div>
