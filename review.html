<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HomeCart - Token Verification</title>

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #F1E9D1; /* Warmer Cream Background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- BOLD MARKER DRAWINGS (Extra Dark 3.5px) --- */
        .drawing {
            position: absolute;
            border: 3.5px solid #0f2b0d; 
            opacity: 1;
            z-index: 0;
        }

        .draw-fridge { width: 55px; height: 85px; top: 12%; left: 6%; border-radius: 4px; }
        .draw-fridge::before { content: ''; position: absolute; width: 100%; height: 3.5px; background: #0f2b0d; top: 40%; }
        
        .draw-sofa { width: 115px; height: 48px; top: 15%; right: 7%; border-radius: 10px; }
        
        .draw-washer { width: 65px; height: 65px; bottom: 10%; left: 9%; border-radius: 12px; }
        .draw-washer::after { content: ''; position: absolute; width: 32px; height: 32px; border: 3.5px solid #0f2b0d; border-radius: 50%; top: 14px; left: 14px; }

        /* Marker Detail Crosses */
        .marker-cross { position: absolute; width: 28px; height: 28px; }
        .marker-cross::before, .marker-cross::after { content: ''; position: absolute; background: #0f2b0d; }
        .marker-cross::before { width: 100%; height: 3.5px; top: 50%; }
        .marker-cross::after { width: 3.5px; height: 100%; left: 50%; }
        .pos-1 { top: 42%; left: 4%; }
        .pos-2 { bottom: 35%; right: 6%; }

        /* --- VERIFICATION CARD --- */
        .container {
            background: #ffffff; 
            padding: 45px;
            border-radius: 35px;
            width: 420px;
            text-align: center;
            box-shadow: 0px 20px 50px rgba(0,0,0,0.1); 
            z-index: 1;
            border: 1px solid rgba(0,0,0,0.05);
        }

        h2 {
            color: #1a4314; 
            text-transform: uppercase;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .step-indicator {
            font-size: 11px;
            color: #1a4314;
            font-weight: bold;
            background: #e9f5e8;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #welcomeMsg { font-weight: bold; color: #1a4314; margin-bottom: 5px; font-size: 18px; }
        #productName { font-weight: 600; color: #666; margin-bottom: 25px; font-size: 14px; }

        /* INPUTS */
        input, textarea {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border-radius: 15px;
            border: 2.5px solid #eee;
            background: #fdfdfd; 
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
            text-align: center;
        }

        input:focus { border-color: #1a4314; }

        /* SECTIONS */
        #reviewSection {
            display: none; 
            border-top: 3px dashed #F1E9D1;
            padding-top: 25px;
            margin-top: 25px;
        }

        /* STARS */
        .stars { margin: 15px 0; }
        .star {
            font-size: 40px;
            cursor: pointer;
            color: #e0e0e0;
            display: inline-block;
        }
        .star.selected { color: #FFD700; }

        /* BUTTONS */
        button {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            border: none;
            border-radius: 18px;
            font-weight: 900;
            cursor: pointer;
            background: #1a4314; 
            color: white;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        button:hover { background: #0f2b0d; }

        #result { margin-top: 20px; font-weight: bold; font-size: 14px; }
    </style>
</head>

<body>

    <div class="drawing draw-fridge"></div>
    <div class="drawing draw-sofa"></div>
    <div class="drawing draw-washer"></div>
    <div class="marker-cross pos-1"></div>
    <div class="marker-cross pos-2"></div>

    <div class="container">
        <div class="step-indicator" id="stepText">Step 1: Verify Purchase</div>
        
        <p id="welcomeMsg">Hello, Customer!</p>
        <h2>Token Verification</h2>
        <p id="productName">Item: Loading...</p>

        <div id="verifySection">
            <input type="text" id="userToken" placeholder="Enter 7-Digit Token" maxlength="7">
            <button onclick="checkToken()">UNLOOCK REVIEW</button>
        </div>

        <div id="reviewSection">
            <div class="stars">
                <span class="star" onclick="setRating(1)">★</span>
                <span class="star" onclick="setRating(2)">★</span>
                <span class="star" onclick="setRating(3)">★</span>
                <span class="star" onclick="setRating(4)">★</span>
                <span class="star" onclick="setRating(5)">★</span>
            </div>
            <textarea id="reviewText" placeholder="Tell us what you think..." style="text-align: left;"></textarea>
            <button onclick="finishReview()">SUBMIT REVIEW</button>
        </div>

        <p id="result"></p>
    </div>

    <script>
        // 1. Get Saved Name and Product Info
        const customer = localStorage.getItem("customerName") || "Customer";
        const item = localStorage.getItem("product") || "HomeCart Item";
        
        document.getElementById("welcomeMsg").innerText = "Hello, " + customer + "!";
        document.getElementById("productName").innerText = "Item: " + item;

        let rating = 0;

        // 2. TOKEN VERIFICATION LOGIC
        function checkToken() {
            const entered = document.getElementById("userToken").value;
            const savedToken = localStorage.getItem("token"); // This should be 7 digits
            const resultMsg = document.getElementById("result");

            // Check if entered token matches the 7-digit saved token
            if (entered === savedToken && savedToken !== null) {
                resultMsg.innerHTML = "✅ Access Granted. Thank you, " + customer + "!";
                resultMsg.style.color = "#1a4314";
                
                // Switch Visibility
                document.getElementById("reviewSection").style.display = "block";
                document.getElementById("verifySection").style.display = "none";
                document.getElementById("stepText").innerText = "Step 2: Leave a Review";
            } else {
                resultMsg.innerHTML = "❌ Invalid 7-Digit Token. Please try again.";
                resultMsg.style.color = "red";
            }
        }

        function setRating(val) {
            rating = val;
            const stars = document.querySelectorAll(".star");
            stars.forEach((s, i) => s.classList.toggle("selected", i < val));
        }

        function finishReview() {
            if (rating === 0) {
                alert("Please select a star rating!");
                return;
            }
            alert("Success! Your verified review is live on HomeCart.");
            window.location.href = "store.html"; 
        }
    </script>

</body>
</html>
